server.port=8081

basyx.backend=MongoDB
spring.data.mongodb.host=mongo
spring.data.mongodb.database=aas-environment
spring.data.mongodb.authentication-database=admin
spring.data.mongodb.username=${MONGO_ROOT_USERNAME}
spring.data.mongodb.password=${MONGO_ROOT_PASSWORD}

basyx.environment=file:aas
basyx.externalurl=http://localhost:8081
basyx.cors.allowed-origins=http://localhost:3000,http://127.0.0.1:3000
basyx.cors.allowed-methods=GET,POST,PATCH,DELETE,PUT,OPTIONS,HEAD

basyx.feature.authorization.enabled=true
basyx.feature.authorization.type=rbac
basyx.feature.authorization.jwtBearerTokenProvider=keycloak
basyx.feature.authorization.rbac.file=file:/application/rbac_rules.json
spring.security.oauth2.resourceserver.jwt.issuer-uri=http://auth.aas.localhost:9090/realms/aas-learning
spring.security.oauth2.resourceserver.jwt.jwk-set-uri=http://keycloak:9090/realms/aas-learning/protocol/openid-connect/certs

basyx.aasenvironment.authorization.preconfiguration.token-endpoint=http://keycloak:9090/realms/aas-learning/protocol/openid-connect/token
basyx.aasenvironment.authorization.preconfiguration.grant-type=CLIENT_CREDENTIALS
basyx.aasenvironment.authorization.preconfiguration.client-id=aas-service
basyx.aasenvironment.authorization.preconfiguration.client-secret=${AAS_SERVICE_CLIENT_SECRET}

basyx.aasrepository.feature.registryintegration=http://aas-registry:8080
basyx.aasrepository.feature.registryintegration.authorization.enabled=true
basyx.aasrepository.feature.registryintegration.authorization.token-endpoint=http://keycloak:9090/realms/aas-learning/protocol/openid-connect/token
basyx.aasrepository.feature.registryintegration.authorization.grant-type=CLIENT_CREDENTIALS
basyx.aasrepository.feature.registryintegration.authorization.client-id=aas-service
basyx.aasrepository.feature.registryintegration.authorization.client-secret=${AAS_SERVICE_CLIENT_SECRET}

basyx.aasrepository.feature.discoveryintegration=http://aas-discovery:8081
basyx.aasrepository.feature.discoveryintegration.authorization.enabled=true
basyx.aasrepository.feature.discoveryintegration.authorization.token-endpoint=http://keycloak:9090/realms/aas-learning/protocol/openid-connect/token
basyx.aasrepository.feature.discoveryintegration.authorization.grant-type=CLIENT_CREDENTIALS
basyx.aasrepository.feature.discoveryintegration.authorization.client-id=aas-service
basyx.aasrepository.feature.discoveryintegration.authorization.client-secret=${AAS_SERVICE_CLIENT_SECRET}

basyx.submodelrepository.feature.registryintegration=http://sm-registry:8080
basyx.submodelrepository.feature.registryintegration.authorization.enabled=true
basyx.submodelrepository.feature.registryintegration.authorization.token-endpoint=http://keycloak:9090/realms/aas-learning/protocol/openid-connect/token
basyx.submodelrepository.feature.registryintegration.authorization.grant-type=CLIENT_CREDENTIALS
basyx.submodelrepository.feature.registryintegration.authorization.client-id=aas-service
basyx.submodelrepository.feature.registryintegration.authorization.client-secret=${AAS_SERVICE_CLIENT_SECRET}

spring.servlet.multipart.max-request-size=128MB
spring.servlet.multipart.max-file-size=128MB
